<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Market Compass</title>
<style>
  :root{
    color-scheme:light;
    --bg:#f4f5f7; --card:#fff; --line:#e5e7eb; --ink:#1a1d24; --muted:#6b7280; --faint:#9ca3af;
    --up:#047857; --upbg:#e7f6ee; --dn:#b91c1c; --dnbg:#fdeaea;
    --dot-up:#10b981; --dot-dn:#ef4444; --dot-na:#cbd5e1;
    --green:#16a34a; --yellow:#f59e0b; --red:#dc2626;
    --nearbg:#fef3c7; --nearink:#92600a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;
    font-size:15px;line-height:1.45;}
  .wrap{max-width:680px;margin:0 auto;padding:14px 12px calc(28px + env(safe-area-inset-bottom));}
  header h1{font-size:19px;margin:0 0 2px;}
  .sub{color:var(--muted);font-size:12px;margin-bottom:12px;}

  /* top tabs */
  .tabs{position:sticky;top:0;z-index:10;display:flex;gap:6px;background:var(--bg);
    padding:10px 4px;margin-bottom:8px;}
  .tabs button{flex:1;font-size:13px;font-weight:600;padding:10px 4px;border:none;
    background:#eceef1;color:var(--ink);border-radius:10px;cursor:pointer;}
  .tabs button.active{background:var(--ink);color:#fff;}

  .loading{text-align:center;padding:44px 0;color:var(--muted);}

  /* index cards */
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
  .icard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 12px 11px;}
  .icard .top{display:flex;align-items:baseline;justify-content:space-between;gap:6px;}
  .icard .short{font-size:16px;font-weight:800;}
  .icard .full{font-size:11px;color:var(--faint);}
  .icard .px{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;margin:4px 0 1px;}
  .icard .yr{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums;}
  .icard .yr .lbl{color:var(--faint);font-weight:500;}
  .icard .dots{display:flex;gap:7px;margin:9px 0 3px;}
  .icard .foot{display:flex;align-items:center;justify-content:space-between;margin-top:6px;}
  .icard .sc{font-size:12px;color:var(--muted);}
  .icard .sc b{font-size:15px;}
  .mapill{display:inline-block;color:#fff;font-weight:800;font-size:12px;padding:4px 10px;border-radius:8px;}
  .icard .interp{font-size:11px;color:var(--muted);margin-top:7px;line-height:1.4;}
  .fb{display:inline-block;margin-top:6px;font-size:10.5px;color:#92600a;background:#fef3c7;
    border-radius:6px;padding:2px 6px;}
  .naidx{color:var(--faint);font-size:12px;padding:6px 0;}

  /* dot */
  .dot{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9.5px;color:var(--faint);}
  .dot i{width:13px;height:13px;border-radius:50%;display:block;}
  .dot.up i{background:var(--dot-up);} .dot.dn i{background:var(--dot-dn);} .dot.na i{background:var(--dot-na);}

  /* traffic light rule */
  .rule{display:flex;gap:12px;align-items:center;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:13px 14px;margin-bottom:12px;}
  .lamp{flex:none;width:16px;height:16px;border-radius:50%;box-shadow:0 0 0 4px rgba(0,0,0,.05);}
  .lamp.green{background:var(--green);} .lamp.yellow{background:var(--yellow);} .lamp.red{background:var(--red);}
  .lamp.gray{background:var(--dot-na);}
  .rule .msg{font-size:15px;font-weight:700;}
  .rule .why{font-size:11.5px;color:var(--muted);margin-top:2px;}

  /* summary chips */
  .chips{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;
    flex-wrap:wrap;padding-bottom:2px;}
  .chip{flex:none;background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:8px 12px;text-align:center;min-width:70px;}
  .chip .n{font-size:18px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1.1;}
  .chip .cl{font-size:11px;color:var(--muted);margin-top:2px;}
  .chip.bull .n{color:var(--up);} .chip.bear .n{color:var(--dn);} .chip.na .n{color:var(--faint);}

  /* top strip: 今日均線訊號（單欄全寬） */
  .topstrip{margin-bottom:14px;}
  .topstrip .sig{margin-bottom:0;padding:10px 12px;}
  .topstrip .sig h3{font-size:12px;}
  .topstrip .sig .sigtxt,.topstrip .sig .noneline{font-size:13px;}

  /* signals */
  .sig{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:11px;}
  .sig h3{margin:0 0 8px;font-size:14px;color:var(--muted);font-weight:600;}
  .sigrow{display:flex;gap:10px;align-items:center;padding:6px 0;}
  .tag{font-size:12px;font-weight:800;padding:4px 10px;border-radius:8px;flex:none;min-width:62px;text-align:center;color:#fff;}
  .tag.b{background:var(--up);} .tag.s{background:var(--dn);}
  .tag.n{background:var(--nearbg);color:var(--nearink);}
  .sigtxt{font-size:14px;}
  .noneline{color:var(--muted);font-size:14px;}

  /* stock list */
  .blk{margin-bottom:16px;}
  .blk h2{font-size:12px;color:var(--muted);font-weight:600;margin:0 0 7px;padding-left:2px;}
  .grphd{font-size:12px;color:var(--ink);font-weight:700;margin:12px 0 6px;padding-left:2px;}
  .row{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:7px;cursor:pointer;}
  .row .head{display:flex;align-items:center;gap:10px;}
  .row .id{flex:none;min-width:70px;}
  .row .sym{font-size:15px;font-weight:800;}
  .row .grp{font-size:10px;color:var(--faint);display:block;margin-top:1px;}
  .row .dots{display:flex;gap:8px;flex:1;justify-content:center;}
  .row .rt{flex:none;text-align:right;min-width:78px;}
  .row .rt .px{font-size:14px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--ink);}
  .row .yr{font-size:13px;font-weight:800;font-variant-numeric:tabular-nums;display:block;}
  .row .yr.up{color:var(--up);} .row .yr.dn{color:var(--dn);} .row .yr.na{color:var(--faint);}
  .row .sc{font-size:11px;color:var(--muted);margin-top:1px;}
  .row .rowip{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.4;}
  .row .note{font-size:11px;color:var(--faint);display:block;margin-top:2px;}
  .row.err{opacity:.6;}
  .row .nd{color:var(--faint);font-size:12px;}

  /* expand detail */
  .detail{display:none;margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);
    grid-template-columns:1fr 1fr;gap:8px;}
  .row.open .detail{display:grid;}
  .mrow{background:var(--bg);border-radius:9px;padding:7px 9px;}
  .mrow.up{background:var(--upbg);} .mrow.dn{background:var(--dnbg);}
  .mrow .ml{font-size:11px;color:var(--muted);}
  .mrow .mv{font-size:14px;font-weight:800;font-variant-numeric:tabular-nums;}
  .mrow .md{font-size:11px;font-weight:700;}
  .mrow.up .md{color:var(--up);} .mrow.dn .md{color:var(--dn);}
  .caret{font-size:11px;color:var(--faint);margin-left:2px;}

  footer{color:var(--muted);font-size:12px;margin-top:22px;text-align:center;line-height:1.6;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Market Compass</h1>
    <div class="sub">多空羅盤 · 週線5/月線20/季線60/年線240MA · 資料更新至 <span id="datadate">—</span></div>
  </header>

  <div class="tabs">
    <button data-tab="macro" class="active">大盤</button>
    <button data-tab="stocks">持股</button>
    <button data-tab="watch">觀察清單</button>
  </div>

  <div id="topstrip" class="topstrip"></div>

  <div id="status" class="loading">讀取資料中…</div>
  <div id="macro" class="pane"></div>
  <div id="stocks" class="pane" hidden></div>
  <div id="watch" class="pane" hidden></div>

  <footer>Designed by Hsuan x her AI bestie</footer>
</div>

<script>
const IDX_META = {
  "^GSPC": {short:"SPX", full:"S&P 500"},
  "^NDX":  {short:"NDX", full:"Nasdaq 100"},
  "^SOX":  {short:"SOX", full:"費城半導體"},
  "^VIX":  {short:"VIX", full:"波動率指數"},
};

let WL=null, DATA=null;

/* ---------- helpers ---------- */
function maByK(r,k){ return (r&&r.mas)?r.mas.find(m=>m.k===k):null; }
function dotCls(m){ if(!m||m.v==null) return "na"; return m.above?"up":"dn"; }
function dotsHtml(r){
  return [5,20,60,240].map(k=>{
    const m=maByK(r,k); const lbl=({5:"5",20:"20",60:"60",240:"240"})[k];
    return `<span class="dot ${dotCls(m)}"><i></i>${lbl}</span>`;
  }).join("");
}
function yrHtml(r){
  const m=maByK(r,240);
  if(!m||m.v==null) return `<span class="yr na">—</span>`;
  const cls=m.above?"up":"dn", s=m.diff>=0?"+":"";
  return `<span class="yr ${cls}">${s}${m.diff.toFixed(1)}%</span>`;
}

/* ---------- 中文解讀（移植舊版邏輯，原封不動） ---------- */
function interpret(r){
  const m=r.mas; if(!m||r.valid===0) return "";
  const a=k=>{ const x=m.find(o=>o.k===k); return x&&x.v!=null?x.above:null; };
  const a5=a(5),a20=a(20),a60=a(60),a240=a(240);
  if([a5,a20,a60,a240].every(x=>x===true)) return "站上所有均線,多頭排列、趨勢最強。";
  if([a5,a20,a60,a240].every(x=>x===false)) return "跌破所有均線,空頭排列、趨勢最弱。";
  if(a240===true) return a60===true ? "中長期多頭(站上季線),短線拉回整理中。" : "在年線之上、但未站上季線,屬整理格局。";
  if(a240===false){
    if(a60===true) return "長期仍在年線下,但已站回季線,屬反彈。";
    if(a20===true||a5===true) return "年線、季線之下,僅短線反彈。";
    return "中長期偏空,留意下檔風險。";
  }
  return "上市時間較短、年線未成形,僅供短中期參考。";
}

/* ---------- macro tab ---------- */
function indexCard(sym){
  const meta=IDX_META[sym]||{short:sym,full:""};
  const r=DATA[sym];
  if(!r||r.error){
    return `<div class="icard"><div class="top"><span class="short">${meta.short}</span><span class="full">${meta.full}</span></div>
      <div class="naidx">${(r&&r.error)||"無資料"}</div></div>`;
  }
  const px=r.price!=null?r.price.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}):"—";
  if(sym==="^VIX"){
    const v=r.price;
    let txt,col;
    if(v>30){txt="警戒";col="var(--red)";}
    else if(v>=20){txt="偏高";col="var(--yellow)";}
    else {txt="平靜";col="var(--green)";}
    return `<div class="icard">
      <div class="top"><span class="short">${meta.short}</span><span class="full">${meta.full}</span></div>
      <div class="px">${px}</div>
      <div><span style="display:inline-block;margin-top:4px;font-size:13px;font-weight:800;color:#fff;padding:4px 12px;border-radius:8px;background:${col}">${txt}</span></div>
    </div>`;
  }
  const m240=maByK(r,240);
  const yr=(m240&&m240.v!=null)?`<span class="yr ${m240.above?'up':'dn'}"><span class="lbl">vs 年線 </span>${m240.diff>=0?'+':''}${m240.diff.toFixed(1)}%</span>`
                               :`<span class="yr"><span class="lbl">vs 年線 </span>—</span>`;
  const fb=r.fallback?`<span class="fb">指數免費方案未支援,以 ${r.src} 代替</span>`:"";
  const ip=interpret(r);
  const ipHtml=ip?`<div class="interp">↳ ${ip}</div>`:"";
  const X=r.score, Y=r.valid;
  const pillBg = (X===Y)?"var(--green)":(X===0)?"var(--red)":"var(--yellow)";
  const pillHtml=`<span class="mapill" style="background:${pillBg}">站上 ${X}/${Y} 均線</span>`;
  return `<div class="icard">
    <div class="top"><span class="short">${meta.short}</span><span class="full">${meta.full}</span></div>
    <div class="px">${px}</div>
    <div>${yr}</div>
    <div class="dots">${dotsHtml(r)}</div>
    <div class="foot">${pillHtml}</div>
    ${fb}
    ${ipHtml}
  </div>`;
}
// 大盤紅綠燈邏輯（只看 NDX 60/240MA 與 VIX）：回傳 {level,msg,why} 供大盤分頁紅綠燈卡使用
function macroLevel(){
  const ndx=DATA["^NDX"], vix=DATA["^VIX"];
  const a=k=>{ const m=maByK(ndx,k); return (m&&m.v!=null)?m.above:null; };
  const a60=a(60), a240=a(240);
  const vixVal=(vix&&!vix.error&&vix.price!=null)?vix.price:null;
  const vixMissing=vixVal==null;
  const vixHigh=vixVal!=null&&vixVal>30;
  const ndxTag=(ndx&&ndx.fallback)?`(以 ${ndx.src} 代替)`:"";
  const vixNote=vixMissing?"(VIX 無資料)":"";
  let level,msg,why;
  if(vixHigh){ level="red"; msg="考慮降槓桿";
    why=`VIX ${vixVal.toFixed(1)} > 30`+(a240===false?" 且 NDX 跌破年線":""); }
  else if(a240===null){ level="gray"; msg="資料不足"; why=`NDX 年線資料尚未成形 ${vixNote}`; }
  else if(a240===false){ level="red"; msg="考慮降槓桿"; why=`NDX 跌破年線 240MA ${ndxTag} ${vixNote}`; }
  else if(a60===null){ level="gray"; msg="資料不足"; why=`NDX 季線資料不足 ${vixNote}`; }
  else if(a60===true){ level="green"; msg="SXRV 槓桿:可維持"; why=`NDX 站上季線 60MA 與年線 240MA ${ndxTag} ${vixNote}`; }
  else { level="yellow"; msg="不加碼"; why=`NDX 在年線上、但跌破季線 60MA ${ndxTag} ${vixNote}`; }
  why=why.replace(/\s+/g," ").trim();
  return {level,msg,why};
}
function macroRuleHtml(){
  const {level,msg,why}=macroLevel();
  return `<div class="rule"><span class="lamp ${level}"></span>
    <div><div class="msg">${msg}</div><div class="why">${why}</div></div></div>`;
}
function renderMacro(){
  const idx=(WL.indexes||[]);
  const mh=(WL.market_holdings||[]);
  const mhRows=mh.map(h=>stockRow(h.s, null, h.note, h.dn)).join("");
  document.getElementById("macro").innerHTML =
    `<div class="cards">${idx.map(indexCard).join("")}</div>` +
    macroRuleHtml() +
    `<div class="blk"><h2>我的大盤部位</h2>${mhRows}</div>`;
}

/* ---------- 訊號（統計 market_holdings + holdings + watch 全部） ---------- */
// 「(持)」與 dn 顯示涵蓋 market_holdings + holdings（兩清單合併建 SET / DN Map）
let HOLD_SET = new Set(), HOLD_DN = new Map();
function buildHoldMaps(){
  const held = [...(((WL&&WL.market_holdings)||[])), ...(((WL&&WL.holdings)||[]))];
  HOLD_SET = new Set(held.map(h=>h.s));
  HOLD_DN  = new Map(held.map(h=>[h.s, h.dn||h.s]));
}
function allTracked(){ return [...(WL.market_holdings||[]), ...(WL.holdings||[]), ...(WL.watch||[])]; }
function symLabel(s){ return HOLD_SET.has(s) ? `${HOLD_DN.get(s)}(持)` : s; }

function crossSignals(){
  const bull=[], bear=[];
  allTracked().forEach(h=>{
    const r=DATA[h.s]; if(!r||r.error||!r.mas) return;
    r.mas.forEach(m=>{ if(m.cross==="bull") bull.push({s:h.s,l:m.label});
                       else if(m.cross==="bear") bear.push({s:h.s,l:m.label}); });
  });
  return {bull,bear};
}
function nearSignals(){
  const arr=[];
  allTracked().forEach(h=>{
    const r=DATA[h.s]; if(!r||r.error||!r.mas) return;
    r.mas.forEach(m=>{ if(m.near===true && m.cross==null && (m.k===60||m.k===240))
      arr.push({s:h.s,lbl:m.k===60?"季線":"年線"}); });
  });
  return arr;
}
function mergeSym(arr){
  const map=new Map();
  arr.forEach(x=>{ if(!map.has(x.s)) map.set(x.s,[]); map.get(x.s).push(x.l.replace("線","")); });
  return [...map.entries()].map(([s,ls])=>`${symLabel(s)} ${ls.join("/")}線`);
}
function signalsHtml(){
  const {bull,bear}=crossSignals();
  const near=nearSignals();
  let h=`<div class="sig"><h3>今日均線訊號</h3>`;
  if(!bull.length&&!bear.length&&!near.length){ return h+`<div class="noneline">今日無訊號</div></div>`; }
  if(bull.length) h+=`<div class="sigrow"><span class="tag b">站上 ↑</span><span class="sigtxt">${mergeSym(bull).join("、")}</span></div>`;
  if(bear.length) h+=`<div class="sigrow"><span class="tag s">跌破 ↓</span><span class="sigtxt">${mergeSym(bear).join("、")}</span></div>`;
  if(near.length){
    const txt=near.map(x=>`${symLabel(x.s)}(${x.lbl})`).join("、");
    h+=`<div class="sigrow"><span class="tag n">接近</span><span class="sigtxt">${txt}</span></div>`;
  }
  return h+`</div>`;
}

/* ---------- 清單（持股 / 觀察通用） ---------- */
function summaryHtml(list){
  const total=list.length;
  let bull=0, bear=0, na=0;
  list.forEach(h=>{
    const r=DATA[h.s];
    if(!r||r.error||r.valid===0){ na++; return; }
    if(r.score===r.valid && r.valid>0) bull++;
    else if(r.score===0) bear++;
  });
  return `<div class="chips">
    <div class="chip"><div class="n">${total}</div><div class="cl">追蹤</div></div>
    <div class="chip bull"><div class="n">${bull}</div><div class="cl">多頭排列</div></div>
    <div class="chip bear"><div class="n">${bear}</div><div class="cl">空頭排列</div></div>
    <div class="chip na"><div class="n">${na}</div><div class="cl">無資料</div></div>
  </div>`;
}
function detailHtml(r){
  const rows=[5,20,60,240].map(k=>{
    const m=maByK(r,k);
    if(!m||m.v==null) return `<div class="mrow"><div class="ml">${({5:'週線 5',20:'月線 20',60:'季線 60',240:'年線 240'})[k]}MA</div><div class="mv">—</div></div>`;
    const cls=m.above?"up":"dn", s=m.diff>=0?"+":"";
    const v=m.v.toLocaleString(undefined,{maximumFractionDigits:2});
    return `<div class="mrow ${cls}"><div class="ml">${({5:'週線 5',20:'月線 20',60:'季線 60',240:'年線 240'})[k]}MA</div>
      <div class="mv">${v}</div><div class="md">${m.above?'站上':'跌破'} ${s}${m.diff.toFixed(1)}%</div></div>`;
  }).join("");
  return rows;
}
function stockRow(sym, group, note, dn){
  const r=DATA[sym];
  const main = dn || sym;
  const idHtml=`<div class="id"><span class="sym">${main}</span>${group?`<span class="grp">${group}</span>`:(note?`<span class="grp">${note}</span>`:"")}</div>`;
  if(!r||r.error){
    return `<div class="row err"><div class="head">${idHtml}<span class="nd">${(r&&r.error)||"無資料"}</span></div></div>`;
  }
  const pxTxt=(r.price!=null)?r.price.toLocaleString(undefined,{maximumFractionDigits:2}):"—";
  const ip=interpret(r);
  const ipHtml=ip?`<div class="rowip">↳ ${ip}</div>`:"";
  return `<div class="row" data-sym="${sym}">
    <div class="head">
      ${idHtml}
      <div class="dots">${dotsHtml(r)}</div>
      <div class="rt"><div class="px">${pxTxt}</div>${yrHtml(r)}<div class="sc">${r.score}/${r.valid} <span class="caret">▾</span></div></div>
    </div>
    ${ipHtml}
    <div class="detail">${detailHtml(r)}</div>
  </div>`;
}
/* ---------- 持股分頁（僅統計 holdings 20 檔，依 watchlist 權重順序） ---------- */
function renderStocks(){
  const list=(WL.holdings||[]);
  let html=summaryHtml(list);
  const rowOf=h=>stockRow(h.s, null, h.note, h.dn);
  html+=`<div class="blk"><h2>持股(權重順序)</h2>${list.map(rowOf).join("")}</div>`;
  document.getElementById("stocks").innerHTML=html;
}

/* ---------- 觀察清單分頁（清單順序，group 顯示在代號下方小字） ---------- */
function renderWatch(){
  const list=(WL.watch||[]);
  let html=summaryHtml(list);
  const rowOf=h=>stockRow(h.s, h.group, null, null);
  html+=`<div class="blk"><h2>觀察清單</h2>${list.map(rowOf).join("")}</div>`;
  document.getElementById("watch").innerHTML=html;
}

/* ---------- 頂部訊息列（今日均線訊號） ---------- */
function renderTopStrip(){
  document.getElementById("topstrip").innerHTML = signalsHtml();
}

/* 切到指定分頁（重用 tab 切換邏輯，含 active 樣式更新） */
function switchTab(t){
  document.querySelectorAll(".tabs button").forEach(x=>x.classList.toggle("active", x.dataset.tab===t));
  document.getElementById("macro").hidden  = t!=="macro";
  document.getElementById("stocks").hidden = t!=="stocks";
  document.getElementById("watch").hidden  = t!=="watch";
}

/* ---------- interactions ---------- */
document.querySelectorAll(".tabs button").forEach(b=>{
  b.addEventListener("click",()=>switchTab(b.dataset.tab));
});
document.addEventListener("click",e=>{
  const row=e.target.closest(".row[data-sym]");
  if(row) row.classList.toggle("open");
});

/* ---------- load（讀取 watchlist.json / data.json） ---------- */
Promise.all([
  fetch("watchlist.json?t="+Date.now()).then(r=>r.json()),
  fetch("data.json?t="+Date.now()).then(r=>r.json()),
]).then(([wl,data])=>{
  WL=wl; DATA=data;
  buildHoldMaps();
  document.getElementById("datadate").textContent=(DATA._updated||"").slice(0,10)||"—";
  document.getElementById("status").style.display="none";
  renderTopStrip();
  renderMacro();
  renderStocks();
  renderWatch();
}).catch(e=>{
  document.getElementById("status").innerHTML='<span class="nd">尚無資料,等待首次自動更新完成。</span>';
});
</script>
</body>
</html>
