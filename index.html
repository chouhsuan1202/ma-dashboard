<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MA dashboard</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body { margin:0; background:#f7f8fa; color:#1a1d24;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;
    font-size:14px; line-height:1.4; }
  .wrap { max-width:1100px; margin:0 auto; padding:16px; }
  header h1 { font-size:20px; margin:0 0 4px; }
  .sub { color:#6b7280; font-size:12px; margin-bottom:14px; }
  .sig { background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:14px 16px; margin-bottom:14px; }
  .sig h3 { margin:0 0 10px; font-size:16px; }
  .sigrow { display:flex; align-items:center; gap:12px; padding:7px 0; border-top:1px solid #f3f4f6; }
  .sigrow:first-of-type { border-top:none; }
  .sigtxt { font-size:14px; font-weight:500; }
  .tag { font-size:13px; font-weight:800; padding:5px 12px; border-radius:8px; white-space:nowrap; flex:none; min-width:78px; text-align:center; }
  .tag.b { background:#047857; color:#fff; } .tag.s { background:#dc2626; color:#fff; } .tag.t { background:#f59e0b; color:#fff; }
  .none { color:#6b7280; font-size:14px; }
  .summary { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:14px; }
  .card { background:#fff; border:1px solid #e5e7eb; border-radius:10px; padding:9px 14px; min-width:96px; }
  .card .n { font-size:20px; font-weight:700; } .card .l { font-size:11px; color:#6b7280; }
  .mng { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; align-items:center; }
  .mng input { font-size:13px; padding:6px 8px; border:1px solid #d1d5db; border-radius:7px; background:#fff; width:170px; }
  .addbtn { background:#1f2937; color:#fff; border:none; border-radius:7px; padding:7px 12px; font-size:13px; cursor:pointer; }
  .editbtn { background:#fff; color:#374151; border:1px solid #d1d5db; border-radius:7px; padding:7px 12px; font-size:13px; cursor:pointer; }
  .editbtn.on { background:#fee2e2; border-color:#fca5a5; color:#b91c1c; }
  .del { color:#b91c1c; cursor:pointer; font-weight:700; margin-left:8px; }
  .mnghint { font-size:11px; color:#9ca3af; }
  .tabs { display:flex; flex-wrap:wrap; gap:2px; border-bottom:2px solid #d1d5db; margin-bottom:14px; }
  .tabs button { font-size:13px; padding:7px 12px; border:1px solid #d1d5db; border-bottom:none;
    background:#eceef1; color:#374151; border-radius:7px 7px 0 0; cursor:pointer; margin-bottom:-2px; }
  .tabs button.active { background:#fff; color:#111827; font-weight:700; border-bottom:2px solid #fff; }
  .group { margin-bottom:18px; }
  .group h2 { font-size:14px; margin:0 0 6px; padding:4px 8px; background:#eef0f3; border-radius:6px; display:inline-block; }
  table { width:100%; border-collapse:collapse; background:#fff; border:1px solid #e5e7eb; border-radius:10px; overflow:hidden; }
  th,td { padding:7px 8px; text-align:right; border-bottom:1px solid #f0f1f3; white-space:nowrap; }
  th { background:#fafbfc; font-size:11px; color:#6b7280; font-weight:600; }
  td.name,th.name { text-align:left; }
  .sym { font-weight:700; } .nm { color:#6b7280; font-size:11px; }
  .ma { font-variant-numeric:tabular-nums; } .ma .v{font-weight:700;font-size:14px;} .ma .d{font-size:10px;display:block;color:#9ca3af;}
  .up { background:#e7f6ee; } .up .v{color:#047857;}
  .dn { background:#fdeaea; } .dn .v{color:#b91c1c;}
  .na { color:#b0b4bb; }
  .x { font-weight:700; } .xb{color:#047857;} .xs{color:#b91c1c;}
  .score { font-weight:700; font-variant-numeric:tabular-nums; }
  .s4{color:#047857;} .s3{color:#10b981;} .s2{color:#9ca3af;} .s1{color:#ef6b6b;} .s0{color:#b91c1c;}
  .err,.nd { color:#9ca3af; font-size:12px; }
  .price { font-weight:700; font-variant-numeric:tabular-nums; }
  .loading { text-align:center; padding:40px; color:#6b7280; }
  footer { color:#9ca3af; font-size:11px; margin-top:24px; text-align:center; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>MA dashboard</h1>
    <div class="sub">美股 · 資料來源 Financial Modeling Prep,每日自動更新 · 資料更新至 <span id="datadate">—</span></div>
  </header>
  <div id="status" class="loading">讀取資料中…</div>
  <div id="signals"></div>
  <div id="summary"></div>
  <div id="manage"></div>
  <div class="tabs" id="tabs" style="display:none"></div>
  <div id="content"></div>
  <footer>資料僅供參考,非投資建議。</footer>
</div>

<script>
const BASE_GROUPS = [
  { name:"記憶體 / 半導體設備", key:"mem", items:[
    {s:"MU",n:"Micron"},{s:"WDC",n:"Western Digital"},{s:"STX",n:"Seagate"},{s:"SNDK",n:"SanDisk"},
    {s:"LRCX",n:"Lam Research"},{s:"AMAT",n:"Applied Materials"},{s:"KLAC",n:"KLA"},{s:"SIMO",n:"Silicon Motion"},{s:"ASML",n:"ASML"} ]},
  { name:"CPU", key:"cpu", items:[ {s:"AMD",n:"AMD"},{s:"INTC",n:"Intel"},{s:"QCOM",n:"Qualcomm"},{s:"ARM",n:"Arm"} ]},
  { name:"光通訊", key:"opt", items:[ {s:"AAOI",n:"Applied Opto"},{s:"LITE",n:"Lumentum"},{s:"COHR",n:"Coherent"},{s:"MRVL",n:"Marvell"} ]},
  { name:"軟體", key:"sw", items:[ {s:"PLTR",n:"Palantir"},{s:"ORCL",n:"Oracle"},{s:"TEAM",n:"Atlassian"},{s:"CRM",n:"Salesforce"},{s:"NET",n:"Cloudflare"},{s:"ADBE",n:"Adobe"},{s:"CRWD",n:"CrowdStrike"} ]},
  { name:"巨頭", key:"big", items:[ {s:"NVDA",n:"Nvidia"},{s:"MSFT",n:"Microsoft"},{s:"TSLA",n:"Tesla"},{s:"AAPL",n:"Apple"},{s:"GOOGL",n:"Alphabet"},{s:"AMZN",n:"Amazon"},{s:"META",n:"Meta"} ]},
  { name:"GPU / AI 算力", key:"gpu", items:[ {s:"NVDA",n:"Nvidia"},{s:"AMD",n:"AMD"},{s:"AVGO",n:"Broadcom"},{s:"TSM",n:"台積電 ADR"} ]},
];
const FOCUS = ["mem","big"];
const WL_KEY="ma_pub_wl_v1";
let wl={removed:[],custom:[]}; try{wl=Object.assign(wl,JSON.parse(localStorage.getItem(WL_KEY)||"{}"));}catch(e){}
let removed=new Set(wl.removed||[]); let custom=wl.custom||[];
function saveWL(){try{localStorage.setItem(WL_KEY,JSON.stringify({removed:[...removed],custom}));}catch(e){}}
let DATA={};

function buildGroups(){
  const groups=BASE_GROUPS.map(g=>({name:g.name,key:g.key,items:g.items.filter(it=>!removed.has(it.s))}));
  custom.forEach(c=>{ if(removed.has(c.s))return;
    let g=groups.find(x=>x.key===c.cat); if(!g){ g=groups.find(x=>x.key==="custom"); if(!g){g={name:"自訂",key:"custom",items:[]};groups.push(g);} }
    if(!g.items.some(it=>it.s===c.s)) g.items.push({s:c.s,n:c.n||c.s});
  });
  return groups.filter(g=>g.items.length);
}
let GROUPS=buildGroups();
function groupByKey(k){ return GROUPS.find(g=>g.key===k); }

function maCell(m){
  if(!m||m.v==null) return '<td class="ma na">—</td>';
  const cls=m.above?"up":"dn", sign=m.diff>=0?"+":"";
  const badge=m.cross==="bull"?' <span class="x xb">↑</span>':m.cross==="bear"?' <span class="x xs">↓</span>':'';
  return `<td class="ma ${cls}"><span class="v">${sign}${m.diff.toFixed(1)}%${badge}</span><span class="d">${m.v.toLocaleString(undefined,{maximumFractionDigits:2})}</span></td>`;
}
function rowHtml(it){
  const r=DATA[it.s]; const del=editMode?` <span class="del" onclick="removeSymbol('${it.s}')">✕</span>`:"";
  if(!r||r.error) return `<tr><td class="name"><span class="sym">${it.s}</span> <span class="nm">${it.n}</span>${del}</td><td class="nd" colspan="6">${(r&&r.error)||"無資料"}</td></tr>`;
  const m=r.mas||[];
  return `<tr><td class="name"><span class="sym">${it.s}</span> <span class="nm">${it.n}</span>${del}</td>
    <td class="price">${r.price!=null?r.price.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}):"—"}</td>
    ${maCell(m[0])}${maCell(m[1])}${maCell(m[2])}${maCell(m[3])}
    <td class="score s${r.score}">${r.score}/${r.valid}</td></tr>`;
}
const THEAD=`<thead><tr><th class="name">代碼 / 名稱</th><th>收盤</th><th>週線 5MA</th><th>月線 20MA</th><th>季線 60MA</th><th>年線 240MA</th><th>多空</th></tr></thead>`;
function tableFor(items){ return `<table>${THEAD}<tbody>${items.map(rowHtml).join("")}</tbody></table>`; }

function buildSignals(){
  const cross=[], near=[]; const seen={};
  GROUPS.forEach(g=>g.items.forEach(it=>{ if(seen[it.s])return; seen[it.s]=1;
    const r=DATA[it.s]; if(!r||r.error||!r.mas)return;
    r.mas.forEach(m=>{ if(m.v==null)return; if(m.cross) cross.push({sym:it.s,label:m.label,dir:m.cross}); else if(m.near) near.push({sym:it.s,label:m.label}); }); }));
  return {cross,near};
}
function signalsHtml(){
  const {cross,near}=buildSignals();
  const bull=cross.filter(c=>c.dir==="bull"), bear=cross.filter(c=>c.dir==="bear");
  let h=`<div class="sig"><h3>今日均線訊號</h3>`;
  if(!bull.length&&!bear.length&&!near.length){ h+=`<div class="none">今日無均線交叉或接近訊號。</div></div>`; return h; }
  if(bull.length) h+=`<div class="sigrow"><span class="tag b">偏多 ↑</span><span class="sigtxt">${bull.map(s=>`${s.sym} 站上${s.label}`).join("、")}</span></div>`;
  if(bear.length) h+=`<div class="sigrow"><span class="tag s">偏空 ↓</span><span class="sigtxt">${bear.map(s=>`${s.sym} 跌破${s.label}`).join("、")}</span></div>`;
  if(near.length) h+=`<div class="sigrow"><span class="tag t">接近</span><span class="sigtxt">${near.map(s=>`${s.sym}(${s.label})`).join("、")}</span></div>`;
  h+=`</div>`; return h;
}
function summaryHtml(){
  let total=0,strong=0,weak=0,errc=0; const seen={};
  GROUPS.forEach(g=>g.items.forEach(it=>{ if(seen[it.s])return; seen[it.s]=1;
    const r=DATA[it.s]; total++; if(!r||r.error){errc++;return;}
    if(r.valid>0&&r.score===r.valid)strong++; if(r.score===0)weak++; }));
  return `<div class="summary">
    <div class="card"><div class="n">${total}</div><div class="l">追蹤股數</div></div>
    <div class="card"><div class="n" style="color:#047857">${strong}</div><div class="l">多頭排列</div></div>
    <div class="card"><div class="n" style="color:#b91c1c">${weak}</div><div class="l">空頭排列</div></div>
    <div class="card"><div class="n" style="color:#6b7280">${errc}</div><div class="l">無資料</div></div>
    <button class="editbtn${editMode?' on':''}" style="margin-left:auto;align-self:center" onclick="toggleEdit()">${editMode?'完成':'編輯'}</button>
  </div>`;
}
function currentTabName(){ if(currentTab==="focus")return "重點"; const g=groupByKey(currentTab); return g?g.name.split(" ")[0]:currentTab; }

let editMode=false;
function buildManage(){
  const el=document.getElementById("manage");
  if(!editMode){ el.innerHTML=""; return; }
  el.innerHTML=`<div class="mng">
    <input id="addSym" placeholder="輸入美股代碼後按加入" onkeydown="if(event.key==='Enter')addSymbol()">
    <button class="addbtn" onclick="addSymbol()">＋ 加到「${currentTabName()}」</button>
    <span class="mnghint">點各列 ✕ 可刪除 · 新代碼需在每日清單內才有資料</span>
  </div>`;
}
window.toggleEdit=function(){ editMode=!editMode; renderUI(); };
window.addSymbol=function(){
  const inp=document.getElementById("addSym"); if(!inp)return;
  const raw=(inp.value||"").trim(); if(!raw)return;
  const sym=raw.toUpperCase();
  let cat=currentTab; if(cat==="focus") cat="big";
  removed.delete(sym);
  if(!custom.some(c=>c.s===sym)) custom.push({s:sym,n:sym,cat:cat}); saveWL();
  GROUPS=buildGroups(); renderUI();
};
window.removeSymbol=function(s){ removed.add(s); custom=custom.filter(c=>c.s!==s); saveWL(); GROUPS=buildGroups(); if(!GROUPS.some(g=>g.key===currentTab))currentTab="focus"; renderUI(); };

let currentTab="focus";
function buildTabs(){
  const tabs=[{key:"focus",name:"重點"}].concat(GROUPS.map(g=>({key:g.key,name:g.name.split(" ")[0].replace("/","")})));
  if(!tabs.some(t=>t.key===currentTab)) currentTab="focus";
  document.getElementById("tabs").innerHTML=tabs.map(t=>`<button data-k="${t.key}" class="${t.key===currentTab?'active':''}">${t.name}</button>`).join("");
  document.querySelectorAll("#tabs button").forEach(b=>b.addEventListener("click",()=>{currentTab=b.dataset.k; renderUI();}));
}
function renderTab(k){
  const el=document.getElementById("content");
  if(k==="focus"){ const fg=FOCUS.map(groupByKey).filter(Boolean);
    el.innerHTML=fg.map(g=>`<div class="group"><h2>${g.name}</h2>${tableFor(g.items)}</div>`).join("");
  } else { const g=groupByKey(k); el.innerHTML=g?`<div class="group"><h2>${g.name}</h2>${tableFor(g.items)}</div>`:""; }
}
function renderUI(){
  document.getElementById("signals").innerHTML=signalsHtml();
  document.getElementById("summary").innerHTML=summaryHtml();
  buildManage();
  document.getElementById("tabs").style.display="flex";
  buildTabs(); renderTab(currentTab);
}

fetch("data.json?t="+Date.now()).then(r=>r.json()).then(d=>{
  DATA=d; document.getElementById("datadate").textContent=(d._updated||"").slice(0,10)||"—";
  document.getElementById("status").style.display="none";
  GROUPS=buildGroups(); renderUI();
}).catch(e=>{ document.getElementById("status").innerHTML='<span class="nd">尚無資料,等待首次自動更新完成。</span>'; });
</script>
</body>
</html>
