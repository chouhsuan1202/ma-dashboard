name: Update MA data

on:
  schedule:
    - cron: "30 22 * * 1-5"   # 週一到五 22:30 UTC(美股收盤後)
  workflow_dispatch: {}
  push:
    branches: [ main ]
    paths:                     # 只在會影響資料的檔案變動時才重抓,省 FMP 額度
      - watchlist.json
      - build_data.py
      - alerts.py
      - .github/workflows/update.yml

permissions:
  contents: write

concurrency:
  group: update-ma-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}   # 供寄信條件判斷用(未設定則略過寄信)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build data.json
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python build_data.py

      # 檢查 SXRV/SEC0 今天是否跌破季線(60MA bear cross)
      - name: Check MA alerts
        id: alerts
        run: python alerts.py

      # 有跌破才寄信。需在 repo Settings → Secrets 設定 MAIL_USERNAME / MAIL_PASSWORD
      # (Gmail 帳號 + 應用程式密碼)。未設定時此步驟會略過,不影響資料更新。
      - name: Send alert email
        if: steps.alerts.outputs.triggered == 'true' && env.MAIL_USERNAME != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: MA Dashboard <${{ secrets.MAIL_USERNAME }}>
          to: chouhsuan1202@gmail.com
          subject: ${{ steps.alerts.outputs.subject }}
          body: ${{ steps.alerts.outputs.body }}

      - name: Commit data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet data.json; then
            git add data.json
            git commit -m "chore: update MA data ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "No changes."
          fi
